<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARTICLE_TITLE — BountyWall</title>
  <meta name="description" content="ARTICLE_DESC"/>
  <meta name="robots" content="index, follow"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --off-white:#f4f7fd; --blue-50:#eff5ff; --blue-100:#dbeafe; --blue-200:#bfdbfe;
      --blue-300:#93c5fd; --blue-400:#60a5fa; --blue-500:#3b82f6; --blue-600:#2563eb;
      --blue-700:#1d4ed8; --ink:#0d1b2e; --ink-mid:#3d5168; --ink-light:#8fa3bb;
      --border:#d6e4f7; --border-dark:#b8d0ed;
      --mono:'DM Mono',monospace; --serif:'Instrument Serif',serif; --sans:'DM Sans',sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--off-white); color:var(--ink); font-family:var(--sans); min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(circle,#c3d9f5 1px,transparent 1px); background-size:28px 28px; opacity:0.4; pointer-events:none; z-index:0; }
    body::after { content:''; position:fixed; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#2563eb,#60a5fa,#1d4ed8); z-index:200; }
    header { position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.93); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 44px; height:64px; display:flex; align-items:center; justify-content:space-between; }
    .logo { display:flex; align-items:baseline; gap:1px; text-decoration:none; }
    .logo-main { font-family:var(--serif); font-size:23px; color:var(--blue-700); }
    .logo-dot { font-family:var(--mono); font-size:14px; color:var(--blue-400); }
    .logo-tld { font-family:var(--mono); font-size:13px; color:var(--ink-light); }
    .back-btn { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--ink-light); text-decoration:none; border:1px solid var(--border); border-radius:6px; padding:6px 14px; transition:all 0.12s; }
    .back-btn:hover { border-color:var(--blue-400); color:var(--blue-600); }
    main { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:52px 28px 100px; }
    .art-back { display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--ink-light); text-decoration:none; border:1px solid var(--border); border-radius:6px; padding:7px 16px; margin-bottom:36px; background:white; transition:all 0.12s; }
    .art-back:hover { border-color:var(--blue-400); color:var(--blue-600); }
    .art-title { font-family:var(--serif); font-size:clamp(28px,4vw,44px); line-height:1.1; letter-spacing:-0.4px; color:var(--ink); margin-bottom:16px; }
    .art-meta { font-family:var(--mono); font-size:10.5px; color:var(--ink-light); margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border); }
    .art-body { font-family:var(--sans); font-size:16.5px; line-height:1.9; color:var(--ink-mid); }
    .art-body p { margin-bottom:20px; }
    .art-body h2 { font-family:var(--serif); font-size:24px; color:var(--ink); margin:36px 0 14px; }
    .art-body h3 { font-family:var(--sans); font-size:17px; font-weight:600; color:var(--ink); margin:28px 0 10px; }
    .art-body ul, .art-body ol { padding-left:22px; margin-bottom:20px; }
    .art-body li { margin-bottom:8px; line-height:1.8; }
    .art-body strong { color:var(--ink); font-weight:600; }
    .art-body a { color:var(--blue-600); text-decoration:underline; }
    .art-body a:hover { color:var(--blue-700); }
    .art-body blockquote { border-left:3px solid var(--blue-300); padding:12px 20px; background:var(--blue-50); border-radius:0 8px 8px 0; margin:24px 0; font-style:italic; color:var(--ink-mid); }
    footer { position:relative; z-index:1; text-align:center; padding:28px; font-family:var(--mono); font-size:10px; color:var(--ink-light); border-top:1px solid var(--border); letter-spacing:0.4px; line-height:2.2; }
    @media (max-width:640px) { header { padding:0 18px; } main { padding:28px 14px 60px; } }
  </style>
</head>
<body>
<header>
  <a class="logo" href="https://bountywall.com">
    <span class="logo-main">BountyWall</span>
    <span class="logo-dot">.</span>
    <span class="logo-tld">com</span>
  </a>
  <a class="back-btn" href="https://articles.bountywall.com">

    All Articles
  </a>
</header>
<main>

    Back to Articles
  </a>
  <div class="art-title">ARTICLE_TITLE</div>
  <div class="art-meta">ARTICLE_DATE &nbsp;·&nbsp; BountyWall</div>
  <div class="art-body">
ARTICLE_BODY
  </div>
</main>
<footer>bountywall.com &nbsp;·&nbsp; articles.bountywall.com &nbsp;·&nbsp; educational &amp; research use only</footer>
</body>
</html>
